# [YAML语言教程](https://www.ruanyifeng.com/blog/2016/07/yaml.html)

# ==================================================
#             服务器是否开启强制白名单
# ==================================================
force_whitelist: true

# 命令提示字符, 可修改为与应用场景不冲突的字符，例如: /
cmd_prompt_char: '$'

# QQ玩家交流群ID，引导新玩家加入讨论
qq_player_group_id: ''

# ==================================================
#     IP地址拦截白名单，在列表区域中的IP被允许登录服务器
# ==================================================
# allow_country_code:
#  - CN
#  - JP
#  - TW

# ==================================================
#                 地图备份与归档
# ==================================================
backup_retention_count: 5
backup_maintenance_motd: "服务器维护中，稍后再试"

# ==================================================
#           白名单分页与自动清理配置
# ==================================================
whitelist_cleanup_inactive_days: 90
whitelist_pagination_delay_ticks: 5
