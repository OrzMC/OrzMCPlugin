# paper-plugin.yml: https://docs.papermc.io/paper/dev/paper-plugin-yml
name: OrzMC
version: 1.0.0
main: com.jokerhub.paper.plugin.orzmc.OrzMC
description: OrzMC for Paper Server Plugin
authors: [ wangzhizhou ]
contributors: [ wangzhizhou ]
website: https://orzmc.jokerhub.cn
api-version: '26.1.2'
folia-supported: false

# Commands declared here for MockBukkit compatibility.
# The same commands are also in plugin.yml.
commands:
  tpbow:
    description: 传送弓，射出的箭落地时会把自己传送到箭落地的位置
    usage: "/tpbow"
    aliases: [ tpb ]
  guide:
    description: 获取新手教程，更快的熟悉服务器
    usage: "/guide"
  menu:
    description: 菜单展示
    usage: "/menu"
  bot:
    description: 查看机器人健康状态
    usage: "/bot"
  portal:
    description: 创建或移除传送门
    usage: "/portal <host> [port] 或 /portal remove <host> [port]"
  orzmc:
    description: OrzMC 管理命令
    usage: "/orzmc reload [config-name] | /orzmc config <list|get|set|reset|dump>"
    permission: orzmc.admin

permissions:
  orzmc.admin:
    description: OrzMC 管理命令权限
    default: op
