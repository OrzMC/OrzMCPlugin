name: Pull Request Build Check
on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: checkout
        uses: actions/checkout@v7

      - name: gradle wrapper validation
        uses: gradle/actions/wrapper-validation@v6

      - name: jdk
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 25

      - name: setup gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: true

      - name: spotless check
        run: ./gradlew spotlessCheck --stacktrace

      - name: unit tests
        run: ./gradlew test --stacktrace

      - name: integration tests
        run: ./gradlew integrationTest --stacktrace

      - name: build shadowJar
        run: ./gradlew shadowJar --stacktrace

      - name: upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report-${{ github.sha }}
          path: build/reports/jacoco/
          if-no-files-found: warn

      - name: generate build summary
        run: |
          echo "### Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **BuildID:** $GITHUB_RUN_ID" >> $GITHUB_STEP_SUMMARY
          echo "- **CommitID:** ${GITHUB_SHA:0:10}" >> $GITHUB_STEP_SUMMARY
          echo "- **PR:** #${{ github.event.pull_request.number }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Author:** ${{ github.event.pull_request.user.login }}" >> $GITHUB_STEP_SUMMARY

      - name: upload jar artifact
        uses: actions/upload-artifact@v7
        with:
          name: orzmc-plugin-${{ github.event.pull_request.head.sha }}
          path: build/libs/*.jar
          if-no-files-found: error

      - name: post PR comment
        uses: actions/github-script@v9
        if: success()
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const marker = '<!-- orzmc-build-summary -->';
            const fullSha = context.payload.pull_request.head.sha;
            const shortSha = fullSha.substring(0, 10);
            const artifactName = 'orzmc-plugin-' + fullSha;
            const base = context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo;
            const runUrl = base + '/actions/runs/' + context.runId;
            const commitUrl = base + '/commit/' + fullSha;
            const { data: artifacts } = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
              name: artifactName
            });
            const artifactId = artifacts.artifacts[0].id;
            const downloadUrl = base + '/actions/runs/' + context.runId + '/artifacts/' + artifactId;
            const now = new Date().toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' });
            const body = marker + '\n## ✅ Build Passed  (' + now + ')' +
              '\n| 项目 | 详情 |' +
              '\n|------|------|' +
              '\n| **BuildID** | [' + context.runId + '](' + runUrl + ') |' +
              '\n| **CommitID** | [' + shortSha + '](' + commitUrl + ') |' +
              '\n| **Artifact** | [' + artifactName + '.zip](' + downloadUrl + ') |' +
              '\n| **Author** | @' + context.payload.pull_request.user.login + ' |';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }
