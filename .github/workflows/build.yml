name: Pull Request Build Check
on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
permissions:
  contents: read
  issues: write
  pull-requests: write
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: checkout
        uses: actions/checkout@v6
      - name: gradle wrapper validation
        uses: gradle/actions/wrapper-validation@v6
      - name: jdk
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 21
      - name: spotless check
        run: ./gradlew spotlessCheck --stacktrace
      - name: unit tests
        run: ./gradlew test --stacktrace
      - name: integration tests
        run: ./gradlew integrationTest --stacktrace
      - name: build shadowJar
        run: ./gradlew clean build --stacktrace
      - name: generate build summary
        run: |
          echo "### Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **BuildID:** $GITHUB_RUN_ID" >> $GITHUB_STEP_SUMMARY
          echo "- **CommitID:** ${GITHUB_SHA:0:10}" >> $GITHUB_STEP_SUMMARY
          echo "- **PR:** #${{ github.event.pull_request.number }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Author:** ${{ github.event.pull_request.user.login }}" >> $GITHUB_STEP_SUMMARY
      - name: post PR comment
        uses: actions/github-script@v7
        if: success()
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const marker = '<!-- orzmc-build-summary -->';
            const sha = context.payload.pull_request.head.sha.substring(0, 10);
            const runUrl = context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId;
            const body = marker + '\n## ✅ Build Passed' +
              '\n- **BuildID:** `' + context.runId + '`' +
              '\n- **CommitID:** `' + sha + '`' +
              '\n- **Artifact:** [Download orzmc-plugin-' + sha + '.jar](' + runUrl + ')' +
              '\n- **Author:** @' + context.payload.pull_request.user.login;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }
      - name: upload jar artifact
        id: artifact-upload-step
        uses: actions/upload-artifact@v7
        with:
          name: orzmc-plugin-${{ github.event.pull_request.head.sha }}
          path: build/libs/*.jar
          if-no-files-found: error
