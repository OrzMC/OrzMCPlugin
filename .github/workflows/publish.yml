name: Publish
on:
  push:
    branches:
      - main                # → Dev 发布 (beta channel)
    tags:
      - '*.*.*'             # → Release 发布 (release channel, 纯 SemVer)

permissions:
  contents: write
  pull-requests: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: checkout
        uses: actions/checkout@v7

      - name: gradle wrapper validation
        uses: gradle/actions/wrapper-validation@v6

      - name: jdk
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 25

      - name: setup gradle
        uses: gradle/actions/setup-gradle@v6

      # Tag 发布前先跑完整检查，main push 跳过（PR 已检查）
      - name: check (tag only)
        if: github.ref_type == 'tag'
        run: ./gradlew check --stacktrace

      - name: publish to Hangar
        env:
          HANGAR_API_TOKEN: ${{ secrets.HANGAR_API_TOKEN }}
        run: |
          # 先构建 shadowJar（快速失败，不消耗 Hangar API 调用）
          ./gradlew shadowJar --stacktrace

          # 发布到 Hangar，含重试逻辑。
          # Hangar 在 Release 通道处理较慢，可能返回 504 Gateway Timeout，
          # 但此时上传往往已成功完成，因此需要重试并处理“版本已存在”的情况。
          max_attempts=3
          for attempt in $(seq 1 $max_attempts); do
            echo "::group::Hangar publish attempt ${attempt}/${max_attempts}"
            output=$(./gradlew publishPluginPublicationToHangar --stacktrace 2>&1) && {
              echo "$output"
              echo "::endgroup::"
              echo "✅ Published to Hangar on attempt ${attempt}"
              echo "::group::Sync Hangar page"
              ./gradlew syncPluginPublicationMainResourcePagePageToHangar --stacktrace
              echo "::endgroup::"
              echo "✅ Hangar page synced"
              exit 0
            }
            echo "$output"
            echo "::endgroup::"

            # 如果 Hangar 返回“版本已存在”，说明之前的尝试已成功上传
            if echo "$output" | grep -qi "already exists\|already created\|version.*already\|duplicate"; then
              echo "⚠️  Version appears to already exist on Hangar — treating as success"
              exit 0
            fi

            if [ "$attempt" -lt "$max_attempts" ]; then
              delay=$((attempt * 20))
              echo "⏳ Attempt ${attempt} failed, retrying in ${delay}s..."
              sleep "$delay"
            fi
          done

          echo "❌ All ${max_attempts} Hangar publish attempts failed"
          exit 1

      - name: publish to Modrinth
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        run: |
          max_attempts=3
          for attempt in $(seq 1 $max_attempts); do
            echo "::group::Modrinth publish attempt ${attempt}/${max_attempts}"
            output=$(./gradlew modrinth --stacktrace 2>&1) && {
              echo "$output"
              echo "::endgroup::"
              echo "✅ Published to Modrinth on attempt ${attempt}"
              echo "::group::Sync Modrinth body"
              ./gradlew modrinthSyncBody --stacktrace
              echo "::endgroup::"
              echo "✅ Modrinth body synced"
              exit 0
            }
            echo "$output"
            echo "::endgroup::"

            if echo "$output" | grep -qi "already exists\|already.*version\|duplicate"; then
              echo "⚠️  Version appears to already exist on Modrinth — treating as success"
              exit 0
            fi

            if [ "$attempt" -lt "$max_attempts" ]; then
              delay=$((attempt * 20))
              echo "⏳ Attempt ${attempt} failed, retrying in ${delay}s..."
              sleep "$delay"
            fi
          done

          echo "❌ All ${max_attempts} Modrinth publish attempts failed"
          exit 1

      - name: create GitHub Release
        if: github.ref_type == 'tag' && !contains(github.ref_name, '-')
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: build/libs/*.jar
          generate_release_notes: true

      - name: bump version
        if: github.ref_type == 'tag' && !contains(github.ref_name, '-')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git fetch origin main

          # 从 tag 创建 Bump 分支
          BRANCH="bump-version-${{ github.ref_name }}"
          git checkout -b "$BRANCH" origin/main

          # 读取当前版本，递增 patch
          CURRENT=$(sed -n 's/^version: *//p' src/main/resources/paper-plugin.yml)
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)
          NEW="$MAJOR.$MINOR.$((PATCH + 1))"

          # 写入新版本
          sed -i 's/^version:.*/version: '"$NEW"'/' src/main/resources/paper-plugin.yml

          # 提交并推送（force-push 覆盖之前失败运行残留的分支）
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/main/resources/paper-plugin.yml
          git commit -m "chore: bump version to $NEW"
          git push origin "$BRANCH" --force

          # 创建 Bump PR
          # 先检查是否已存在同分支的 PR，避免重复创建
          if gh pr list --head "$BRANCH" --json number --jq 'length > 0' | grep -q true; then
            echo "⚠️  PR for branch $BRANCH already exists, skipping creation"
          else
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "chore: bump version to $NEW" \
              --body "Automated version bump after release ${{ github.ref_name }}"
          fi

          # 启用自动合并（如果 PR 存在）
          gh pr merge "$BRANCH" --auto --merge || true
