name: Publish to Hangar
on:
  push:
    branches:
      - main                # → Snapshot 发布
    tags:
      - '*.*.*'             # → Release 发布（SemVer，无 v 前缀）

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: checkout
        uses: actions/checkout@v7

      - name: gradle wrapper validation
        uses: gradle/actions/wrapper-validation@v6

      - name: jdk
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 25

      - name: check (tag only)
        if: github.ref_type == 'tag'
        run: ./gradlew check --stacktrace

      - name: build shadowJar
        run: ./gradlew clean build --stacktrace

      - name: publish to Hangar
        env:
          HANGAR_API_TOKEN: ${{ secrets.HANGAR_API_TOKEN }}
        run: ./gradlew clean publishPluginPublicationToHangar --stacktrace

      - name: bump version (tag only)
        if: github.ref_type == 'tag'
        run: |
          git fetch origin main
          git checkout main

          # 读取当前版本，递增 patch
          CURRENT=$(yq '.version' src/main/resources/paper-plugin.yml)
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)
          NEW="$MAJOR.$MINOR.$((PATCH + 1))"

          # 写入新版本
          yq -i ".version = \"$NEW\"" src/main/resources/paper-plugin.yml

          # 提交并推送
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/main/resources/paper-plugin.yml
          git commit -m "chore: bump version to $NEW"
          git push
