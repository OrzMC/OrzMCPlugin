name: 功能建议
description: 为插件提出新功能或改进
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的建议。请描述清楚你想解决什么问题，以及期望的方案。

  - type: textarea
    id: problem
    attributes:
      label: 要解决什么问题
      description: 你遇到了什么场景或痛点，需要这个功能来解决？
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望方案
      description: 你期望插件如何实现？尽量描述具体
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你还考虑过哪些其他方式？

  - type: checkboxes
    id: participation
    attributes:
      label: 参与意愿
      options:
        - label: 我愿意参与该功能的实现（提交 PR）
